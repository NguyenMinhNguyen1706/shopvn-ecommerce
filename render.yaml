services:
  - type: web
    name: shopvn-backend
    runtime: node
    rootDir: ecommerce-backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: shopvn-postgres
          property: connectionString
      - key: DB_SSL
        value: "true"
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: shopvn-redis
          property: connectionString
      - key: FRONTEND_URL
        value: https://shopvn-ecommerce.vercel.app
      - key: CORS_ORIGINS
        value: https://shopvn-ecommerce.vercel.app
      - key: BACKEND_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d

  - type: keyvalue
    name: shopvn-redis
    plan: free
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

databases:
  - name: shopvn-postgres
    plan: free
    databaseName: ecommerce_db
    user: shopvn
