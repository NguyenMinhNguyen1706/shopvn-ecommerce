services:
  - type: web
    name: shopvn-backend
    runtime: node
    region: singapore
    rootDir: ecommerce-backend
    plan: free
    buildCommand: npm ci --omit=dev
    startCommand: npm run db:migrate && npm start
    healthCheckPath: /ready
    maxShutdownDelaySeconds: 60
    autoDeployTrigger: checksPass
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: shopvn-postgres
          property: connectionString
      - key: DB_SSL
        value: "true"
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: shopvn-redis
          property: connectionString
      - key: FRONTEND_URL
        value: https://shopvn-ecommerce.vercel.app
      - key: CORS_ORIGINS
        value: https://shopvn-ecommerce.vercel.app
      - key: BACKEND_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: API_RATE_LIMIT_MAX
        value: "300"
      - key: API_RATE_LIMIT_WINDOW_SECONDS
        value: "60"
      - key: JSON_BODY_LIMIT
        value: 2mb
      - key: FORM_BODY_LIMIT
        value: 2mb
      - key: LOG_LEVEL
        value: info
      - key: DB_SYNC_ON_STARTUP
        value: "false"
      - key: SEED_ON_STARTUP
        value: "false"
      - key: ENSURE_INVENTORY_ON_STARTUP
        value: "false"
      - key: REQUIRE_WEBHOOK_IP_ALLOWLIST
        value: "false"
      - key: WEBHOOK_SHARED_SECRET
        sync: false
      - key: VNPAY_TMN_CODE
        sync: false
      - key: VNPAY_HASH_SECRET
        sync: false
      - key: VNPAY_URL
        sync: false
      - key: VNPAY_RETURN_URL
        sync: false
      - key: VNPAY_IPN_URL
        sync: false
      - key: ZALOPAY_APP_ID
        sync: false
      - key: ZALOPAY_KEY1
        sync: false
      - key: ZALOPAY_KEY2
        sync: false
      - key: ZALOPAY_CALLBACK_URL
        sync: false
      - key: MOMO_PARTNER_CODE
        sync: false
      - key: MOMO_ACCESS_KEY
        sync: false
      - key: MOMO_SECRET_KEY
        sync: false
      - key: MOMO_IPN_URL
        sync: false
      - key: PAYOS_CLIENT_ID
        sync: false
      - key: PAYOS_API_KEY
        sync: false
      - key: PAYOS_CHECKSUM_KEY
        sync: false

  - type: worker
    name: shopvn-worker
    runtime: node
    region: singapore
    rootDir: ecommerce-backend
    plan: starter
    buildCommand: npm ci --omit=dev
    startCommand: npm run db:migrate && npm run worker
    maxShutdownDelaySeconds: 60
    autoDeployTrigger: checksPass
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: shopvn-postgres
          property: connectionString
      - key: DB_SSL
        value: "true"
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: shopvn-redis
          property: connectionString
      - key: FRONTEND_URL
        value: https://shopvn-ecommerce.vercel.app
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        value: "false"
      - key: EMAIL_FROM
        sync: false
      - key: WORKER_CONCURRENCY
        value: "5"
      - key: LOG_LEVEL
        value: info

  - type: keyvalue
    name: shopvn-redis
    plan: free
    region: singapore
    ipAllowList: []
    maxmemoryPolicy: noeviction

databases:
  - name: shopvn-postgres
    plan: free
    region: singapore
    databaseName: ecommerce_db
    user: shopvn
    ipAllowList: []
