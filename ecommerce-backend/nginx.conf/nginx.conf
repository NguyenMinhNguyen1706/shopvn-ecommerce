user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format json_analytics escape=json '{"time":"$time_iso8601",'
                                          '"client_ip":"$remote_addr",'
                                          '"request":"$request",'
                                          '"status":$status,'
                                          '"bytes":$body_bytes_sent,'
                                          '"request_time":$request_time,'
                                          '"request_id":"$request_id"}';
    access_log /var/log/nginx/access.log json_analytics;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;
    client_max_body_size 2m;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript application/xml;

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    upstream shopvn_backend {
        least_conn;
        server app1:3000 max_fails=3 fail_timeout=10s;
        server app2:3000 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    server {
        listen 80;
        listen [::]:80;
        server_name _;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;

        location / {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://shopvn_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        location /socket.io/ {
            proxy_pass http://shopvn_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_read_timeout 1h;
        }

        location = /health {
            proxy_pass http://shopvn_backend/health;
            access_log off;
        }

        location = /ready {
            proxy_pass http://shopvn_backend/ready;
            access_log off;
        }
    }
}
