x-app-environment: &app-environment
  NODE_ENV: ${NODE_ENV:-development}
  PORT: 3000
  DB_HOST: db
  DB_PORT: 5432
  DB_NAME: ${POSTGRES_DB:-shopvn_db}
  DB_USER: ${POSTGRES_USER:-shopvn_user}
  DB_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
  REDIS_URL: redis://redis:6379
  FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5500}
  BACKEND_URL: ${BACKEND_URL:-http://localhost}
  DB_SYNC_ON_STARTUP: "false"
  SEED_ON_STARTUP: "false"
  ENSURE_INVENTORY_ON_STARTUP: "false"

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shopvn_db}
      POSTGRES_USER: ${POSTGRES_USER:-shopvn_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend-net
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-shopvn_user} -d ${POSTGRES_DB:-shopvn_db}
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  app1:
    build: .
    restart: unless-stopped
    command: sh -c "npm run db:migrate && npm start"
    environment:
      <<: *app-environment
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?Set JWT_REFRESH_SECRET in .env}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend-net

  app2:
    build: .
    restart: unless-stopped
    command: sh -c "npm run db:migrate && npm start"
    environment:
      <<: *app-environment
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?Set JWT_REFRESH_SECRET in .env}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend-net

  worker:
    build: .
    restart: unless-stopped
    command: sh -c "npm run db:migrate && npm run worker"
    environment:
      <<: *app-environment
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-5}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend-net

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app1:
        condition: service_healthy
      app2:
        condition: service_healthy
    networks:
      - backend-net

networks:
  backend-net:
    driver: bridge

volumes:
  pgdata:
  redisdata:
