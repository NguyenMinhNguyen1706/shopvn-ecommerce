services:
  - type: web
    name: shopvn-api
    runtime: docker
    plan: starter
    healthCheckPath: /ready
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: shopvn-postgres
          property: connectionString
      - key: DB_SSL
        value: "true"
      - key: REDIS_URL
        fromService:
          type: redis
          name: shopvn-redis
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: VNPAY_TMN_CODE
        sync: false
      - key: VNPAY_HASH_SECRET
        sync: false
      - key: VNPAY_RETURN_URL
        sync: false
      - key: VNPAY_IPN_URL
        sync: false
      - key: MOMO_PARTNER_CODE
        sync: false
      - key: MOMO_ACCESS_KEY
        sync: false
      - key: MOMO_SECRET_KEY
        sync: false
      - key: MOMO_IPN_URL
        sync: false
      - key: PAYOS_CLIENT_ID
        sync: false
      - key: PAYOS_API_KEY
        sync: false
      - key: PAYOS_CHECKSUM_KEY
        sync: false

  - type: redis
    name: shopvn-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru

databases:
  - name: shopvn-postgres
    plan: starter
    databaseName: ecommerce_db
    user: shopvn
