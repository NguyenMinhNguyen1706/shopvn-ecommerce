name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ecommerce-backend
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://shopvn_test:shopvn_test@127.0.0.1:5432/shopvn_test
      DB_SSL: "false"
      REDIS_URL: redis://127.0.0.1:6379
      FRONTEND_URL: http://127.0.0.1:8891
      BACKEND_URL: http://127.0.0.1:3000
      JWT_SECRET: ci-access-secret-at-least-32-characters
      JWT_REFRESH_SECRET: ci-refresh-secret-at-least-32-characters
      WEBHOOK_SHARED_SECRET: ci-marketplace-webhook-secret

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: shopvn_test
          POSTGRES_USER: shopvn_test
          POSTGRES_PASSWORD: shopvn_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U shopvn_test -d shopvn_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ecommerce-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Validate fresh database migrations
        run: npm run db:migrate

      - name: Run backend tests
        run: npm run test:ci

      - name: Check frontend JavaScript syntax
        run: find ../js ../admin -name '*.js' -type f -print0 | xargs -0 -n1 node --check

      - name: Validate Docker Compose
        env:
          POSTGRES_PASSWORD: compose-validation-only
          JWT_SECRET: compose-validation-access-key-32chars
          JWT_REFRESH_SECRET: compose-validation-refresh-key-32chars
        run: docker compose config --quiet

      - name: Validate Nginx configuration
        run: >-
          docker run --rm
          -v "$PWD/nginx.conf/nginx.conf:/etc/nginx/nginx.conf:ro"
          nginx:1.27-alpine nginx -t
